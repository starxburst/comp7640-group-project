{% extends "base.html" %}
{% block title %}Add Vendor{% endblock %}
{% block content %}
<div class="mb-4">
  <h4><i class="bi bi-plus-circle me-2"></i>Add New Vendor</h4>
</div>

<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Business Name <span class="text-danger">*</span></label>
        <input type="text" name="business_name" class="form-control" required placeholder="e.g. TechZone HK">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Location</label>
        <input type="text" name="location" class="form-control" placeholder="e.g. Mong Kok, Hong Kong">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Add Vendor</button>
        <a href="{{ url_for('vendor.list_vendors') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
