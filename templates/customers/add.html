{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}
{% block content %}
<div class="mb-4">
  <h4><i class="bi bi-person-plus me-2"></i>Add New Customer</h4>
</div>

<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required placeholder="e.g. Alice Chan">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Contact Number</label>
        <input type="text" name="contact_number" class="form-control" placeholder="e.g. 96001234">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Shipping Address</label>
        <textarea name="shipping_address" class="form-control" rows="2"
                  placeholder="e.g. 12 Nathan Road, Kowloon"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Add Customer</button>
        <a href="{{ url_for('customer.list_customers') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
